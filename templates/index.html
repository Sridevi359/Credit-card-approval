<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Card Approval Prediction</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0F2027,#203A43,#2C5364);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#1565C0;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:gray;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1565C0;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0D47A1;
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    background:#E3F2FD;
    color:#1565C0;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:gray;
    font-size:13px;
}
</style>

</head>

<body>

<div class="container">

<h1>💳 Credit Card Approval</h1>
<p>Bank & Finance Prediction System</p>

<form action="/predict" method="POST">

<input type="number" name="age" placeholder="Age" required>

<input type="number" name="income" placeholder="Annual Income" required>

<select name="employment">
<option value="1">Employed</option>
<option value="0">Unemployed</option>
</select>

<input type="number" name="credit_score" placeholder="Credit Score" required>

<select name="existing_loan">
<option value="0">No Existing Loan</option>
<option value="1">Existing Loan</option>
</select>

<input type="number" name="dependents" placeholder="Number of Dependents" required>

<button type="submit">Predict</button>

</form>

{% if prediction %}
<div class="result">
{{ prediction }}
</div>
{% endif %}

<div class="footer">
Powered by Python | Flask | Machine Learning
</div>

</div>

</body>
</html>
